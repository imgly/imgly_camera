pluginManagement {
    def flutterSdkPath = {
        def properties = new Properties()
        file("local.properties").withInputStream { properties.load(it) }
        def flutterSdkPath = properties.getProperty("flutter.sdk")
        assert flutterSdkPath != null, "flutter.sdk not set in local.properties"
        return flutterSdkPath
    }()

    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")

    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
        maven {
            name "IMG.LY Artifactory"
            url "https://artifactory.img.ly/artifactory/maven"
            mavenContent {
                includeGroup("ly.img")
            }
        }
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.11.0" apply false
    id "com.android.library" version "8.11.0" apply false
    id 'org.jetbrains.kotlin.android' version "1.9.10" apply false
    id 'com.github.gmazzo.buildconfig' version "5.3.5" apply false
}

include ":app"

// Internal use only
def editorDir = file("../../../../../../apps/cesdk_android")
if (editorDir.exists() && System.getenv("UBQ_ANDROID_USE_ARTIFACTS") != "true") {
    includeBuild(editorDir) {
        name "camera"
        dependencySubstitution {
            substitute module('ly.img:camera') using project(':camera')
        }
    }
}
// Internal use only
